<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZüriNews — Puls von Zürich & Schweiz</title>
  <meta name="description" content="Live-Terminal: News, Wirtschaft, Finanzen, Blaulicht und Events aus Zürich und der Schweiz.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════
       VARIABLES
       ══════════════════════════════════════ */
    :root {
      --bg: #0a0c10;
      --surface: rgba(255,255,255,0.02);
      --surface-hover: rgba(255,255,255,0.05);
      --surface-new: rgba(239,68,68,0.035);
      --border: rgba(255,255,255,0.05);
      --border-on: rgba(239,68,68,0.4);
      --t1: #f1f5f9;
      --t2: #94a3b8;
      --t3: #64748b;
      --t4: #475569;
      --t5: #334155;
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --blue: #3b82f6;
      --blue-bg: rgba(59,130,246,0.1);
      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    /* ══════════════════════════════════════
       RESET
       ══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font); background: var(--bg); color: var(--t1); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }

    /* Grain */
    body::before {
      content: ''; position: fixed; inset: 0; opacity: 0.02; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ══════════════════════════════════════
       HEADER
       ══════════════════════════════════════ */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, var(--bg) 80%, transparent);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 0 0 8px;
    }
    .header-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px 6px; flex-wrap: wrap; gap: 8px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); animation: pulse 1.5s ease-in-out infinite; }
    .dot.off { background: #6b7280; animation: none; }
    .title { font-family: var(--mono); font-size: 19px; font-weight: 700; letter-spacing: 0.04em; }
    .title em { color: var(--red); font-style: normal; }
    .badge {
      font-family: var(--mono); font-size: 7.5px; font-weight: 700;
      letter-spacing: 0.14em; color: var(--red); background: var(--red-bg);
      padding: 2px 7px; border-radius: 3px;
    }
    .badge.off { color: #6b7280; background: rgba(107,114,128,0.12); }
    .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .info { font-family: var(--mono); font-size: 9.5px; color: var(--t4); }
    .btn {
      font-family: var(--mono); font-size: 9.5px; padding: 4px 10px;
      border-radius: 5px; transition: all 0.15s;
      background: rgba(255,255,255,0.04); color: var(--t3);
    }
    .btn:hover { background: rgba(255,255,255,0.08); color: var(--t2); }
    .btn.red { background: var(--red-bg); color: var(--red); }
    .btn.red:hover { background: rgba(239,68,68,0.18); }

    /* ══════════════════════════════════════
       FILTERS
       ══════════════════════════════════════ */
    .filters {
      display: flex; gap: 4px; padding: 2px 20px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .ftag {
      font-size: 11.5px; font-weight: 500; color: var(--t4);
      background: rgba(255,255,255,0.025); padding: 5px 13px;
      border-radius: 18px; white-space: nowrap; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .ftag:hover { color: var(--t3); background: rgba(255,255,255,0.05); }
    .ftag.on { background: var(--red-bg); color: var(--t1); font-weight: 700; }
    .ftag .n { font-family: var(--mono); font-size: 8.5px; opacity: 0.4; }

    /* ══════════════════════════════════════
       FEED
       ══════════════════════════════════════ */
    .feed { padding: 8px 20px 88px; position: relative; z-index: 1; }

    /* ── Section divider ── */
    .section-label {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--t4); padding: 16px 0 6px;
      border-bottom: 1px solid var(--border); margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label .icon { font-size: 12px; }

    /* ── Card ── */
    .card {
      display: flex; gap: 12px; padding: 12px 14px; margin-bottom: 1px;
      border-radius: 8px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      transition: background 0.15s; animation: fadeIn 0.3s ease both;
      position: relative;
    }
    .card:hover { background: var(--surface-hover); }
    .card.fresh { background: var(--surface-new); animation: fadeIn 0.3s ease both, glow 2s ease-in-out 3; }
    .new-tag {
      position: absolute; top: 7px; right: 7px;
      font-family: var(--mono); font-size: 7.5px; font-weight: 700;
      letter-spacing: 0.08em; color: #fff; background: var(--red);
      padding: 1.5px 6px; border-radius: 3px;
    }
    .card-body { flex: 1; min-width: 0; }
    .meta { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; flex-wrap: wrap; }
    .src-tag {
      font-family: var(--mono); font-size: 8px; font-weight: 700;
      color: #fff; padding: 1.5px 6px; border-radius: 3px;
      letter-spacing: 0.03em; text-transform: uppercase;
    }
    .cat-name { font-size: 10.5px; color: var(--t4); font-weight: 500; }
    .ago { font-family: var(--mono); font-size: 9px; color: var(--t5); }
    .card h3 { font-size: 14px; font-weight: 600; line-height: 1.36; margin-bottom: 2px; }
    .card p { font-size: 12px; line-height: 1.5; color: var(--t2); }
    .img {
      width: 80px; height: 58px; border-radius: 7px; overflow: hidden;
      flex-shrink: 0; align-self: center; background: rgba(255,255,255,0.03);
    }
    .img img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ══════════════════════════════════════
       TICKER
       ══════════════════════════════════════ */
    .ticker {
      display: flex; align-items: center; gap: 10px;
      margin-top: 18px; padding: 9px 0;
      border-top: 1px solid var(--border); overflow: hidden;
    }
    .ticker-tag {
      font-family: var(--mono); font-size: 8px; font-weight: 700;
      letter-spacing: 0.14em; color: var(--red); background: var(--red-bg);
      padding: 3px 7px; border-radius: 3px; flex-shrink: 0;
    }
    .ticker-track { overflow: hidden; flex: 1; }
    .ticker-scroll {
      display: inline-flex; white-space: nowrap;
      animation: scroll 160s linear infinite;
    }
    .ticker-scroll span { font-size: 11.5px; color: var(--t2); }
    .ticker-scroll b { font-weight: 700; }
    .ticker-scroll .sep { margin: 0 14px; font-size: 5px; color: var(--t5); vertical-align: middle; }

    /* ══════════════════════════════════════
       STATES
       ══════════════════════════════════════ */
    .loading { display: flex; flex-direction: column; align-items: center; padding: 90px 0; gap: 14px; }
    .spinner { width: 24px; height: 24px; border: 2.5px solid rgba(255,255,255,0.06); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; }
    .loading span { font-family: var(--mono); font-size: 11px; color: var(--t4); }
    .empty { text-align: center; padding: 70px 20px; color: var(--t3); }

    /* ══════════════════════════════════════
       FOOTER
       ══════════════════════════════════════ */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(0deg, var(--bg) 60%, transparent);
      padding: 30px 20px 10px; text-align: center;
    }
    .footer div { font-family: var(--mono); font-size: 9px; color: var(--t4); letter-spacing: 0.02em; }
    .footer .sub { font-size: 8px; color: var(--t5); margin-top: 2px; }

    /* ══════════════════════════════════════
       ANIMATIONS
       ══════════════════════════════════════ */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(1.3); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes glow { 0%,100% { box-shadow: inset 0 0 0 1px rgba(239,68,68,0.15); } 50% { box-shadow: inset 0 0 0 2px rgba(239,68,68,0.4); } }

    /* ══════════════════════════════════════
       RESPONSIVE
       ══════════════════════════════════════ */
    @media (max-width: 600px) {
      .header-row { padding: 10px 14px 4px; }
      .feed { padding: 6px 14px 88px; }
      .filters { padding: 2px 14px; }
      .card { padding: 10px 12px; gap: 10px; }
      .card h3 { font-size: 13px; }
      .img { width: 68px; height: 50px; }
      .title { font-size: 16px; }
      .controls .info { display: none; }
    }
  </style>
</head>
<body>

  <!-- ═══════ HEADER ═══════ -->
  <header class="header">
    <div class="header-row">
      <div class="brand">
        <div class="dot" id="dot"></div>
        <h1 class="title"><em>ZÜRI</em>NEWS</h1>
        <span class="badge" id="badge">LIVE</span>
      </div>
      <div class="controls">
        <span class="info" id="time"></span>
        <span class="info" id="stat"></span>
        <button class="btn" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
        <button class="btn red" onclick="refresh()">↻ Laden</button>
      </div>
    </div>
    <nav class="filters" id="filters"></nav>
  </header>

  <!-- ═══════ FEED ═══════ -->
  <main class="feed" id="feed"></main>

  <!-- ═══════ FOOTER ═══════ -->
  <footer class="footer">
    <div>SRF · 20min · Blick · cash · finanzen.ch · FintechNews · swissinfo · Polizei ZH · UZH · Presseportal</div>
    <div class="sub">Alle Artikel gratis lesbar · Auto-Polling alle 2 Min. · Keine Daten gespeichert</div>
  </footer>


  <script>
  // ════════════════════════════════════════════════════════════════════
  //  FEED-QUELLEN — Nur 100% gratis lesbare Seiten
  //
  //  Kategorien:
  //    Zürich     = Lokalnachrichten Stadt & Region Zürich
  //    Schweiz    = Nationale News
  //    Wirtschaft = Business, Unternehmen, Konjunktur
  //    Finanzen   = Börse, Märkte, Fintech, Banking
  //    Blaulicht  = Polizei, Unfälle, Notfälle Kt. Zürich
  //    Events     = Veranstaltungen, Kultur, Uni
  //
  // ════════════════════════════════════════════════════════════════════

  const FEEDS = [

    // ── ZÜRICH ──────────────────────────────────────────────
    { u: "https://partner-feeds.20min.ch/rss/20minuten/zuerich",
      k: "Zürich", s: "20min", c: "#1d4ed8" },
    { u: "https://www.blick.ch/life/rss.xml",
      k: "Zürich", s: "Blick", c: "#e11d48" },

    // ── SCHWEIZ ─────────────────────────────────────────────
    { u: "https://www.srf.ch/news/bnf/rss/1890",
      k: "Schweiz", s: "SRF", c: "#c82828" },
    { u: "https://www.srf.ch/news/bnf/rss/1646",
      k: "Schweiz", s: "SRF", c: "#c82828" },
    { u: "https://partner-feeds.20min.ch/rss/20minuten/schweiz",
      k: "Schweiz", s: "20min", c: "#1d4ed8" },
    { u: "https://www.blick.ch/schweiz/rss.xml",
      k: "Schweiz", s: "Blick", c: "#e11d48" },
    { u: "https://www.blick.ch/news/rss.xml",
      k: "Schweiz", s: "Blick", c: "#e11d48" },
    { u: "https://www.swissinfo.ch/ger/rss/top-news",
      k: "Schweiz", s: "swissinfo", c: "#7c3aed" },

    // ── WIRTSCHAFT ──────────────────────────────────────────
    { u: "https://www.srf.ch/news/bnf/rss/1926",
      k: "Wirtschaft", s: "SRF", c: "#c82828" },
    { u: "https://partner-feeds.20min.ch/rss/20minuten/wirtschaft",
      k: "Wirtschaft", s: "20min", c: "#1d4ed8" },
    { u: "https://www.blick.ch/wirtschaft/rss.xml",
      k: "Wirtschaft", s: "Blick", c: "#e11d48" },
    { u: "https://www.cash.ch/feeds/latest/news",
      k: "Wirtschaft", s: "cash.ch", c: "#059669" },

    // ── FINANZEN ────────────────────────────────────────────
    { u: "https://www.cash.ch/feeds/latest/top-news",
      k: "Finanzen", s: "cash.ch", c: "#059669" },
    { u: "https://www.finanzen.ch/rss/news",
      k: "Finanzen", s: "finanzen.ch", c: "#0d9488" },
    { u: "https://fintechnews.ch/feed",
      k: "Finanzen", s: "FintechNews", c: "#6366f1" },

    // ── BLAULICHT (Polizei Kt. Zürich) ──────────────────────
    { u: "https://polizeinews.ch/feed",
      k: "Blaulicht", s: "Polizei.news", c: "#2563eb" },
    { u: "https://polizeiticker.ch/kanton/zuerich/feed",
      k: "Blaulicht", s: "Polizeiticker", c: "#1e40af" },
    { u: "https://polizei-zurich.ch/feed",
      k: "Blaulicht", s: "Kapo ZH", c: "#1e3a5f" },

    // ── EVENTS (Zürich, Uni, Presse) ────────────────────────
    { u: "https://www.agenda.uzh.ch/rss",
      k: "Events", s: "Uni Zürich", c: "#b45309" },
    { u: "https://www.presseportal-schweiz.ch/feed",
      k: "Events", s: "Presseportal", c: "#78716c" },
  ];

  const API  = "https://api.rss2json.com/v1/api.json?rss_url=";
  const POLL = 120000;
  const CATS = ["Alle", "Zürich", "Schweiz", "Wirtschaft", "Finanzen", "Blaulicht", "Events"];

  // Category icons for section labels
  const CAT_ICON = {
    "Zürich": "🏙️", "Schweiz": "🇨🇭", "Wirtschaft": "📊",
    "Finanzen": "💹", "Blaulicht": "🚨", "Events": "🎭"
  };

  // ── STATE ──
  let arts = [], flt = "Alle", paused = false, timer = null;
  let prev = new Set(), fresh = new Set();

  const $ = id => document.getElementById(id);

  // ── HELPERS ──
  function ago(d) {
    const m = Math.max(0, Math.floor((Date.now() - new Date(d).getTime()) / 6e4));
    if (m < 1) return "jetzt";
    if (m < 60) return m + " Min.";
    const h = Math.floor(m / 60);
    if (h < 24) return h + " Std.";
    return Math.floor(h / 24) + "d";
  }

  function strip(h) {
    if (!h) return "";
    const d = document.createElement("div");
    d.innerHTML = h;
    return d.textContent.trim().slice(0, 200);
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function dedup(arr) {
    const seen = new Set();
    return arr.filter(a => {
      const k = (a.title || "").trim().toLowerCase().slice(0, 80);
      if (!k || seen.has(k)) return false;
      seen.add(k);
      return true;
    });
  }

  // ── FETCH ALL FEEDS ──
  async function fetchAll(init) {
    let ok = 0, fl = 0;
    const items = [];

    const jobs = FEEDS.map(async f => {
      try {
        const r = await fetch(API + encodeURIComponent(f.u));
        if (!r.ok) throw 0;
        const d = await r.json();
        if (d.status !== "ok" || !d.items) throw 0;
        ok++;
        return d.items.map(i => ({
          id: f.s + "|" + (i.link || i.title),
          title: i.title || "",
          desc: strip(i.description || i.content || ""),
          link: i.link || "#",
          date: i.pubDate || "",
          s: f.s, k: f.k, c: f.c,
          img: i.thumbnail || (i.enclosure && i.enclosure.link) || null
        }));
      } catch { fl++; return []; }
    });

    const results = await Promise.allSettled(jobs);
    results.forEach(r => { if (r.status === "fulfilled") items.push(...r.value); });

    const sorted = dedup(items).sort((a, b) => new Date(b.date) - new Date(a.date));

    // Detect new
    const cur = new Set(sorted.map(a => a.id));
    if (!init && prev.size) {
      fresh = new Set();
      cur.forEach(id => { if (!prev.has(id)) fresh.add(id); });
      if (fresh.size) setTimeout(() => { fresh = new Set(); render(); }, 8000);
    }
    prev = cur;
    arts = sorted;

    $("time").textContent = new Date().toLocaleTimeString("de-CH", { hour: "2-digit", minute: "2-digit" });
    $("stat").textContent = ok + "/" + FEEDS.length + " Quellen";
    renderFilters();
    render();
  }

  // ── RENDER FILTERS ──
  function renderFilters() {
    $("filters").innerHTML = CATS.map(c => {
      const n = c === "Alle" ? arts.length : arts.filter(a => a.k === c).length;
      const on = flt === c ? " on" : "";
      return `<button class="ftag${on}" onclick="setF('${c}')">${c}<span class="n">${n}</span></button>`;
    }).join("");
  }

  function setF(c) { flt = c; renderFilters(); render(); }

  // ── RENDER FEED ──
  function render() {
    const el = $("feed");
    const list = (flt === "Alle" ? arts : arts.filter(a => a.k === flt)).slice(0, 100);

    if (!arts.length) {
      el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Feeds werden geladen…</span></div>';
      return;
    }
    if (!list.length) {
      el.innerHTML = `<div class="empty">Keine Artikel in «${flt}».</div>`;
      return;
    }

    let html = "";

    if (flt === "Alle") {
      // ── Grouped by category ──
      const order = ["Zürich", "Schweiz", "Wirtschaft", "Finanzen", "Blaulicht", "Events"];
      order.forEach(cat => {
        const catItems = arts.filter(a => a.k === cat).slice(0, 10);
        if (!catItems.length) return;
        html += `<div class="section-label"><span class="icon">${CAT_ICON[cat] || ""}</span>${cat}</div>`;
        html += catItems.map((a, i) => cardHTML(a, i)).join("");
      });
    } else {
      // ── Single category, chronological ──
      html = list.map((a, i) => cardHTML(a, i)).join("");
    }

    // Ticker
    if (arts.length > 5) {
      const t = arts.slice(0, 30).map(a =>
        `<span><b style="color:${a.c}">${esc(a.s)}</b> — ${esc(a.title)}<span class="sep">●</span></span>`
      ).join("");
      html += `<div class="ticker"><span class="ticker-tag">TICKER</span><div class="ticker-track"><div class="ticker-scroll">${t}${t}</div></div></div>`;
    }

    el.innerHTML = html;
  }

  function cardHTML(a, i) {
    const isNew = fresh.has(a.id);
    const d = a.desc ? a.desc.slice(0, 140) + (a.desc.length > 140 ? "…" : "") : "";
    const img = a.img
      ? `<div class="img"><img src="${esc(a.img)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`
      : "";
    return `<a href="${esc(a.link)}" target="_blank" rel="noopener noreferrer"
      class="card${isNew ? " fresh" : ""}" style="animation-delay:${Math.min(i * 20, 400)}ms">
      ${isNew ? '<div class="new-tag">NEU</div>' : ""}
      <div class="card-body">
        <div class="meta">
          <span class="src-tag" style="background:${a.c}">${esc(a.s)}</span>
          <span class="cat-name">${esc(a.k)}</span>
          <span class="ago">${ago(a.date)}</span>
        </div>
        <h3>${esc(a.title)}</h3>
        ${d ? `<p>${esc(d)}</p>` : ""}
      </div>
      ${img}
    </a>`;
  }

  // ── CONTROLS ──
  function togglePause() {
    paused = !paused;
    $("dot").classList.toggle("off", paused);
    $("badge").classList.toggle("off", paused);
    $("badge").textContent = paused ? "PAUSIERT" : "LIVE";
    $("pauseBtn").textContent = paused ? "▶ Weiter" : "⏸ Pause";
    if (paused) clearInterval(timer); else poll();
  }

  function refresh() {
    $("feed").innerHTML = '<div class="loading"><div class="spinner"></div><span>Aktualisiere…</span></div>';
    fetchAll(false);
  }

  function poll() {
    if (timer) clearInterval(timer);
    timer = setInterval(() => fetchAll(false), POLL);
  }

  // ── INIT ──
  renderFilters();
