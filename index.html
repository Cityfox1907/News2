<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZüriNews — Puls von Zürich & Schweiz</title>
  <meta name="description" content="Live-Terminal: News, Wirtschaft, Finanzen, Blaulicht und Events aus Zürich und der Schweiz.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0c10;--sf:rgba(255,255,255,0.02);--sh:rgba(255,255,255,0.05);--sn:rgba(239,68,68,0.035);--bd:rgba(255,255,255,0.05);--bo:rgba(239,68,68,0.4);--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--t4:#475569;--t5:#334155;--r:#ef4444;--rb:rgba(239,68,68,0.1);--f:'DM Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
    body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100vh}
    a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:none}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
    body::before{content:'';position:fixed;inset:0;opacity:0.02;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    .hd{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg) 80%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:0 0 8px}
    .hr{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 6px;flex-wrap:wrap;gap:8px}
    .br{display:flex;align-items:center;gap:10px}
    .dt{width:9px;height:9px;border-radius:50%;background:var(--r);animation:pu 1.5s ease-in-out infinite}
    .dt.off{background:#6b7280;animation:none}
    .tt{font-family:var(--m);font-size:19px;font-weight:700;letter-spacing:.04em}
    .tt em{color:var(--r);font-style:normal}
    .bg{font-family:var(--m);font-size:7.5px;font-weight:700;letter-spacing:.14em;color:var(--r);background:var(--rb);padding:2px 7px;border-radius:3px}
    .bg.off{color:#6b7280;background:rgba(107,114,128,0.12)}
    .ct{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .nf{font-family:var(--m);font-size:9.5px;color:var(--t4)}
    .bt{font-family:var(--m);font-size:9.5px;padding:4px 10px;border-radius:5px;transition:all .15s;background:rgba(255,255,255,0.04);color:var(--t3)}
    .bt:hover{background:rgba(255,255,255,0.08);color:var(--t2)}
    .bt.rd{background:var(--rb);color:var(--r)}.bt.rd:hover{background:rgba(239,68,68,0.18)}

    .fl{display:flex;gap:4px;padding:2px 20px;overflow-x:auto;scrollbar-width:none}.fl::-webkit-scrollbar{display:none}
    .fg{font-size:11.5px;font-weight:500;color:var(--t4);background:rgba(255,255,255,0.025);padding:5px 13px;border-radius:18px;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px}
    .fg:hover{color:var(--t3);background:rgba(255,255,255,0.05)}
    .fg.on{background:var(--rb);color:var(--t1);font-weight:700}
    .fg .n{font-family:var(--m);font-size:8.5px;opacity:.4}

    .fd{padding:8px 20px 88px;position:relative;z-index:1}
    .sl{font-family:var(--m);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);padding:16px 0 6px;border-bottom:1px solid var(--bd);margin-bottom:4px;display:flex;align-items:center;gap:8px}
    .sl .ic{font-size:12px}

    .cd{display:flex;gap:12px;padding:12px 14px;margin-bottom:1px;border-radius:8px;background:var(--sf);border-bottom:1px solid var(--bd);transition:background .15s;animation:fi .3s ease both;position:relative}
    .cd:hover{background:var(--sh)}
    .cd.fw{background:var(--sn);animation:fi .3s ease both,gl 2s ease-in-out 3}
    .nt{position:absolute;top:7px;right:7px;font-family:var(--m);font-size:7.5px;font-weight:700;letter-spacing:.08em;color:#fff;background:var(--r);padding:1.5px 6px;border-radius:3px}
    .cb{flex:1;min-width:0}
    .me{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
    .st{font-family:var(--m);font-size:8px;font-weight:700;color:#fff;padding:1.5px 6px;border-radius:3px;letter-spacing:.03em;text-transform:uppercase}
    .cn{font-size:10.5px;color:var(--t4);font-weight:500}
    .ag{font-family:var(--m);font-size:9px;color:var(--t5)}
    .lk{font-size:9px;opacity:.5;margin-left:2px}
    .cd h3{font-size:14px;font-weight:600;line-height:1.36;margin-bottom:2px}
    .cd p{font-size:12px;line-height:1.5;color:var(--t2)}
    .im{width:80px;height:58px;border-radius:7px;overflow:hidden;flex-shrink:0;align-self:center;background:rgba(255,255,255,0.03)}
    .im img{width:100%;height:100%;object-fit:cover;display:block}

    .tk{display:flex;align-items:center;gap:10px;margin-top:18px;padding:9px 0;border-top:1px solid var(--bd);overflow:hidden}
    .tg{font-family:var(--m);font-size:8px;font-weight:700;letter-spacing:.14em;color:var(--r);background:var(--rb);padding:3px 7px;border-radius:3px;flex-shrink:0}
    .tw{overflow:hidden;flex:1}
    .ts{display:inline-flex;white-space:nowrap;animation:sc 160s linear infinite}
    .ts span{font-size:11.5px;color:var(--t2)}.ts b{font-weight:700}.ts .sp{margin:0 14px;font-size:5px;color:var(--t5);vertical-align:middle}

    .lo{display:flex;flex-direction:column;align-items:center;padding:90px 0;gap:14px}
    .sn{width:24px;height:24px;border:2.5px solid rgba(255,255,255,0.06);border-top-color:var(--r);border-radius:50%;animation:spin .7s linear infinite}
    .lo span{font-family:var(--m);font-size:11px;color:var(--t4)}
    .em{text-align:center;padding:70px 20px;color:var(--t3)}

    .ft{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(0deg,var(--bg) 60%,transparent);padding:30px 20px 10px;text-align:center}
    .ft div{font-family:var(--m);font-size:9px;color:var(--t4);letter-spacing:.02em}
    .ft .su{font-size:8px;color:var(--t5);margin-top:2px}

    @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.3)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes sc{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @keyframes gl{0%,100%{box-shadow:inset 0 0 0 1px rgba(239,68,68,0.15)}50%{box-shadow:inset 0 0 0 2px rgba(239,68,68,0.4)}}

    @media(max-width:600px){.hr{padding:10px 14px 4px}.fd{padding:6px 14px 88px}.fl{padding:2px 14px}.cd{padding:10px 12px;gap:10px}.cd h3{font-size:13px}.im{width:68px;height:50px}.tt{font-size:16px}.ct .nf{display:none}}
  </style>
</head>
<body>
  <header class="hd">
    <div class="hr">
      <div class="br">
        <div class="dt" id="dot"></div>
        <h1 class="tt"><em>ZÜRI</em>NEWS</h1>
        <span class="bg" id="badge">LIVE</span>
      </div>
      <div class="ct">
        <span class="nf" id="time"></span>
        <span class="nf" id="stat"></span>
        <button class="bt" id="pb" onclick="toggleP()">⏸ Pause</button>
        <button class="bt rd" onclick="rl()">↻ Laden</button>
      </div>
    </div>
    <nav class="fl" id="fl"></nav>
  </header>
  <main class="fd" id="fd"></main>
  <footer class="ft">
    <div>SRF · NZZ · Tagi · 20min · Blick · cash · finanzen.ch · FintechNews · swissinfo · Beobachter · Polizei · UZH · SNB</div>
    <div class="su">🔒 = Abo nötig für Volltext · Auto-Polling alle 2 Min. · Keine Daten gespeichert</div>
  </footer>

  <script>
  // ══════════════════════════════════════════════════════════
  //  ALLE SCHWEIZER RSS-FEEDS
  //  🔓 = Gratis lesbar   🔒 = Paywall (Headline + Link gratis)
  // ══════════════════════════════════════════════════════════

  const FEEDS = [

    // ═══════ ZÜRICH ═══════════════════════════════════════════
    { u:"https://www.nzz.ch/zuerich.rss",
      k:"Zürich", s:"NZZ", c:"#1e3a5f", pw:true },
    { u:"https://partner-feeds.publishing.tamedia.ch/rss/tagesanzeiger/zuerich",
      k:"Zürich", s:"Tagi", c:"#0f4c81", pw:true },
    { u:"https://partner-feeds.20min.ch/rss/20minuten/zuerich",
      k:"Zürich", s:"20min", c:"#1d4ed8", pw:false },
    { u:"https://www.blick.ch/life/rss.xml",
      k:"Zürich", s:"Blick", c:"#e11d48", pw:false },

    // ═══════ SCHWEIZ ══════════════════════════════════════════
    { u:"https://www.srf.ch/news/bnf/rss/1890",
      k:"Schweiz", s:"SRF", c:"#c82828", pw:false },
    { u:"https://www.srf.ch/news/bnf/rss/1646",
      k:"Schweiz", s:"SRF", c:"#c82828", pw:false },
    { u:"https://www.nzz.ch/schweiz.rss",
      k:"Schweiz", s:"NZZ", c:"#1e3a5f", pw:true },
    { u:"https://www.nzz.ch/startseite.rss",
      k:"Schweiz", s:"NZZ", c:"#1e3a5f", pw:true },
    { u:"https://partner-feeds.publishing.tamedia.ch/rss/tagesanzeiger/schweiz",
      k:"Schweiz", s:"Tagi", c:"#0f4c81", pw:true },
    { u:"https://partner-feeds.20min.ch/rss/20minuten/schweiz",
      k:"Schweiz", s:"20min", c:"#1d4ed8", pw:false },
    { u:"https://www.blick.ch/schweiz/rss.xml",
      k:"Schweiz", s:"Blick", c:"#e11d48", pw:false },
    { u:"https://www.blick.ch/news/rss.xml",
      k:"Schweiz", s:"Blick", c:"#e11d48", pw:false },
    { u:"https://www.swissinfo.ch/ger/rss/top-news",
      k:"Schweiz", s:"swissinfo", c:"#7c3aed", pw:false },
    { u:"https://www.beobachter.ch/rss_feed",
      k:"Schweiz", s:"Beobachter", c:"#b45309", pw:false },

    // ═══════ WIRTSCHAFT ══════════════════════════════════════
    { u:"https://www.srf.ch/news/bnf/rss/1926",
      k:"Wirtschaft", s:"SRF", c:"#c82828", pw:false },
    { u:"https://www.nzz.ch/wirtschaft.rss",
      k:"Wirtschaft", s:"NZZ", c:"#1e3a5f", pw:true },
    { u:"https://partner-feeds.publishing.tamedia.ch/rss/tagesanzeiger/wirtschaft",
      k:"Wirtschaft", s:"Tagi", c:"#0f4c81", pw:true },
    { u:"https://partner-feeds.20min.ch/rss/20minuten/wirtschaft",
      k:"Wirtschaft", s:"20min", c:"#1d4ed8", pw:false },
    { u:"https://www.blick.ch/wirtschaft/rss.xml",
      k:"Wirtschaft", s:"Blick", c:"#e11d48", pw:false },
    { u:"https://www.cash.ch/feeds/latest/news",
      k:"Wirtschaft", s:"cash.ch", c:"#059669", pw:false },

    // ═══════ FINANZEN ════════════════════════════════════════
    { u:"https://www.cash.ch/feeds/latest/top-news",
      k:"Finanzen", s:"cash.ch", c:"#059669", pw:false },
    { u:"https://www.nzz.ch/finanzen.rss",
      k:"Finanzen", s:"NZZ", c:"#1e3a5f", pw:true },
    { u:"https://www.finanzen.ch/rss/news",
      k:"Finanzen", s:"finanzen.ch", c:"#0d9488", pw:false },
    { u:"https://fintechnews.ch/feed",
      k:"Finanzen", s:"FintechNews", c:"#6366f1", pw:false },

    // ═══════ BLAULICHT ═══════════════════════════════════════
    { u:"https://polizeinews.ch/feed",
      k:"Blaulicht", s:"Polizei.news", c:"#2563eb", pw:false },
    { u:"https://polizeiticker.ch/kanton/zuerich/feed",
      k:"Blaulicht", s:"Polizeiticker", c:"#1e40af", pw:false },
    { u:"https://polizei-zurich.ch/feed",
      k:"Blaulicht", s:"Kapo ZH", c:"#1e3a5f", pw:false },

    // ═══════ EVENTS ══════════════════════════════════════════
    { u:"https://www.agenda.uzh.ch/rss/agenda_xml.php?d=30",
      k:"Events", s:"Uni Zürich", c:"#b45309", pw:false },
    { u:"https://www.presseportal-schweiz.ch/feed",
      k:"Events", s:"Presseportal", c:"#78716c", pw:false },
    { u:"https://www.snb.ch/selector/de/mmr/speeches/rss",
      k:"Events", s:"SNB", c:"#065f46", pw:false },
    { u:"https://www.nzz.ch/panorama.rss",
      k:"Events", s:"NZZ", c:"#1e3a5f", pw:true },
  ];

  const API  = "https://api.rss2json.com/v1/api.json?rss_url=";
  const POLL = 120000;
  const CATS = ["Alle","Zürich","Schweiz","Wirtschaft","Finanzen","Blaulicht","Events"];
  const ICON = {"Zürich":"🏙️","Schweiz":"🇨🇭","Wirtschaft":"📊","Finanzen":"💹","Blaulicht":"🚨","Events":"🎭"};

  let arts=[],flt="Alle",psd=false,tmr=null,prev=new Set(),fw=new Set();
  const $=id=>document.getElementById(id);

  function ago(d){const m=Math.max(0,Math.floor((Date.now()-new Date(d).getTime())/6e4));if(m<1)return"jetzt";if(m<60)return m+"m";const h=Math.floor(m/60);if(h<24)return h+"h";return Math.floor(h/24)+"d"}
  function strip(h){if(!h)return"";const d=document.createElement("div");d.innerHTML=h;return d.textContent.trim().slice(0,200)}
  function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
  function dedup(a){const s=new Set();return a.filter(x=>{const k=(x.title||"").trim().toLowerCase().slice(0,80);if(!k||s.has(k))return false;s.add(k);return true})}

  async function fetchAll(init){
    let ok=0,fl=0;const items=[];
    const jobs=FEEDS.map(async f=>{
      try{
        const r=await fetch(API+encodeURIComponent(f.u));
        if(!r.ok)throw 0;
        const d=await r.json();
        if(d.status!=="ok"||!d.items)throw 0;
        ok++;
        return d.items.map(i=>({
          id:f.s+"|"+(i.link||i.title),
          title:i.title||"",
          desc:strip(i.description||i.content||""),
          link:i.link||"#",
          date:i.pubDate||"",
          s:f.s,k:f.k,c:f.c,pw:f.pw,
          img:i.thumbnail||(i.enclosure&&i.enclosure.link)||null
        }));
      }catch{fl++;return[]}
    });
    (await Promise.allSettled(jobs)).forEach(r=>{if(r.status==="fulfilled")items.push(...r.value)});
    const sorted=dedup(items).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const cur=new Set(sorted.map(a=>a.id));
    if(!init&&prev.size){fw=new Set();cur.forEach(id=>{if(!prev.has(id))fw.add(id)});if(fw.size)setTimeout(()=>{fw=new Set();render()},8000)}
    prev=cur;arts=sorted;
    $("time").textContent=new Date().toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"});
    $("stat").textContent=ok+"/"+FEEDS.length+" Quellen";
    renderF();render();
  }

  function renderF(){
    $("fl").innerHTML=CATS.map(c=>{
      const n=c==="Alle"?arts.length:arts.filter(a=>a.k===c).length;
      return`<button class="fg${flt===c?" on":""}" onclick="setC('${c}')">${c}<span class="n">${n}</span></button>`;
    }).join("");
  }
  function setC(c){flt=c;renderF();render()}

  function render(){
    const el=$("fd");
    const list=(flt==="Alle"?arts:arts.filter(a=>a.k===flt)).slice(0,120);
    if(!arts.length){el.innerHTML='<div class="lo"><div class="sn"></div><span>Feeds werden geladen…</span></div>';return}
    if(!list.length){el.innerHTML=`<div class="em">Keine Artikel in «${flt}».</div>`;return}

    let h="";
    if(flt==="Alle"){
      ["Zürich","Schweiz","Wirtschaft","Finanzen","Blaulicht","Events"].forEach(cat=>{
        const ci=arts.filter(a=>a.k===cat).slice(0,12);
        if(!ci.length)return;
        h+=`<div class="sl"><span class="ic">${ICON[cat]||""}</span>${cat}</div>`;
        h+=ci.map((a,i)=>card(a,i)).join("");
      });
    }else{
      h=list.map((a,i)=>card(a,i)).join("");
    }

    // Ticker
    if(arts.length>5){
      const t=arts.slice(0,30).map(a=>
        `<span><b style="color:${a.c}">${esc(a.s)}</b>${a.pw?"🔒":""} — ${esc(a.title)}<span class="sp">●</span></span>`
      ).join("");
      h+=`<div class="tk"><span class="tg">TICKER</span><div class="tw"><div class="ts">${t}${t}</div></div></div>`;
    }
    el.innerHTML=h;
  }

  function card(a,i){
    const isNew=fw.has(a.id);
    const d=a.desc?a.desc.slice(0,130)+(a.desc.length>130?"…":""):"";
    const img=a.img?`<div class="im"><img src="${esc(a.img)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`:"";
    const lock=a.pw?`<span class="lk">🔒</span>`:"";
    return`<a href="${esc(a.link)}" target="_blank" rel="noopener noreferrer" class="cd${isNew?" fw":""}" style="animation-delay:${Math.min(i*18,350)}ms">
      ${isNew?'<div class="nt">NEU</div>':""}
      <div class="cb">
        <div class="me">
          <span class="st" style="background:${a.c}">${esc(a.s)}</span>${lock}
          <span class="cn">${esc(a.k)}</span>
          <span class="ag">${ago(a.date)}</span>
        </div>
        <h3>${esc(a.title)}</h3>
        ${d?`<p>${esc(d)}</p>`:""}
      </div>${img}</a>`;
  }

  function toggleP(){
    psd=!psd;$("dot").classList.toggle("off",psd);$("badge").classList.toggle("off",psd);
    $("badge").textContent=psd?"PAUSIERT":"LIVE";$("pb").textContent=psd?"▶ Weiter":"⏸ Pause";
    if(psd)clearInterval(tmr);else poll();
  }
  function rl(){$("fd").innerHTML='<div class="lo"><div class="sn"></div><span>Aktualisiere…</span></div>';fetchAll(false)}
  function poll(){if(tmr)clearInterval(tmr);tmr=setInterval(()=>fetchAll(false),POLL)}

  renderF();fetchAll(true);poll();
  </script>
</body>
</html>
